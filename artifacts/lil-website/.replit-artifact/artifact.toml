kind = "web"
previewPath = "/"
title = "Leaders in Lipstick®"
version = "1.0.0"
id = "artifacts/lil-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19051

[services.development]
run = "pnpm --filter @workspace/lil-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lil-website", "run", "build" ]
publicDir = "artifacts/lil-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19051"
BASE_PATH = "/"
